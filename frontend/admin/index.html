<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earlybird Admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    min-height: 100vh;
  }

  /* ── Login ──────────────────────────────────── */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .login-box {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 40px;
    width: 360px;
  }
  .login-box h1 {
    font-size: 22px;
    color: #58a6ff;
    margin-bottom: 24px;
    text-align: center;
  }
  .login-box input {
    width: 100%;
    padding: 10px 14px;
    margin-bottom: 14px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #c9d1d9;
    font-size: 14px;
  }
  .login-box input:focus { border-color: #58a6ff; outline: none; }
  .login-box button {
    width: 100%;
    padding: 10px;
    background: #238636;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
    font-weight: 600;
  }
  .login-box button:hover { background: #2ea043; }
  .login-error {
    color: #f85149;
    font-size: 13px;
    margin-bottom: 10px;
    display: none;
  }

  /* ── Dashboard ──────────────────────────────── */
  #dashboard { display: none; }

  .topbar {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 14px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .topbar h1 { font-size: 18px; color: #58a6ff; }
  .topbar .user-info { display: flex; align-items: center; gap: 14px; }
  .topbar .user-info span { font-size: 13px; color: #8b949e; }
  .topbar button {
    padding: 6px 14px;
    background: #21262d;
    color: #c9d1d9;
    border: 1px solid #30363d;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .topbar button:hover { background: #30363d; }

  .container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 24px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-bottom: 24px;
  }

  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 20px;
  }
  .card h2 {
    font-size: 14px;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
  .stat-value {
    font-size: 36px;
    font-weight: 700;
    color: #58a6ff;
  }
  .stat-label {
    font-size: 13px;
    color: #8b949e;
    margin-top: 4px;
  }

  .section {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .section h2 {
    font-size: 16px;
    color: #c9d1d9;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid #21262d;
  }

  /* ── Sources table ──────────────────────────── */
  .source-list {
    width: 100%;
    border-collapse: collapse;
  }
  .source-list th, .source-list td {
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid #21262d;
    font-size: 14px;
  }
  .source-list th { color: #8b949e; font-weight: 600; }
  .source-tag {
    display: inline-block;
    background: #1f6feb22;
    color: #58a6ff;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 12px;
    margin: 2px;
  }

  .add-source-form {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }
  .add-source-form input {
    flex: 1;
    padding: 8px 12px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #c9d1d9;
    font-size: 13px;
  }
  .add-source-form input:focus { border-color: #58a6ff; outline: none; }

  /* ── Buttons ────────────────────────────────── */
  .btn {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
  }
  .btn-primary { background: #238636; color: #fff; }
  .btn-primary:hover { background: #2ea043; }
  .btn-blue { background: #1f6feb; color: #fff; }
  .btn-blue:hover { background: #388bfd; }
  .btn-danger { background: #da3633; color: #fff; }
  .btn-danger:hover { background: #f85149; }

  /* ── LLM config ─────────────────────────────── */
  .llm-form { display: flex; flex-direction: column; gap: 14px; }
  .llm-form label { font-size: 13px; color: #8b949e; }
  .llm-form select, .llm-form input[type="text"], .llm-form input[type="password"] {
    width: 100%;
    padding: 8px 12px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #c9d1d9;
    font-size: 14px;
  }
  .llm-form select:focus, .llm-form input:focus { border-color: #58a6ff; outline: none; }
  .field-group { display: flex; flex-direction: column; gap: 4px; }
  .key-status { font-size: 12px; color: #8b949e; }
  .key-status.set { color: #3fb950; }

  /* ── Map rebuild ────────────────────────────── */
  .rebuild-section { display: flex; align-items: center; gap: 16px; }
  .rebuild-status { font-size: 13px; color: #8b949e; }

  /* ── Toast ──────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #1f6feb;
    color: #fff;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 1000;
  }
  .toast.show { opacity: 1; }
  .toast.error { background: #da3633; }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-box">
    <h1>Earlybird Admin</h1>
    <div class="login-error" id="login-error">Invalid credentials</div>
    <input type="text" id="login-user" placeholder="Username" autocomplete="username">
    <input type="password" id="login-pass" placeholder="Password" autocomplete="current-password">
    <button onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="topbar">
    <h1>Earlybird Admin</h1>
    <div class="user-info">
      <span id="user-display"></span>
      <button onclick="doLogout()">Sign Out</button>
    </div>
  </div>

  <div class="container">
    <!-- Stats -->
    <div class="grid" id="stats-grid">
      <div class="card">
        <h2>Total Items</h2>
        <div class="stat-value" id="stat-items">--</div>
        <div class="stat-label">indexed entries</div>
      </div>
      <div class="card">
        <h2>Categories</h2>
        <div class="stat-value" id="stat-categories">--</div>
        <div class="stat-label">cluster topics</div>
      </div>
      <div class="card">
        <h2>Sources</h2>
        <div class="stat-value" id="stat-sources">--</div>
        <div class="stat-label">active data sources</div>
      </div>
    </div>

    <!-- Data Sources -->
    <div class="section">
      <h2>Data Sources</h2>
      <table class="source-list">
        <thead><tr><th>Group</th><th>Sources</th></tr></thead>
        <tbody id="sources-body"></tbody>
      </table>
      <div class="add-source-form">
        <input type="text" id="new-source-name" placeholder="Source name (e.g. my_feed)">
        <input type="text" id="new-source-group" placeholder="Group (optional)">
        <button class="btn btn-primary" onclick="addSource()">Add Source</button>
      </div>
    </div>

    <!-- LLM Configuration -->
    <div class="section">
      <h2>LLM Configuration</h2>
      <div class="llm-form">
        <div class="field-group">
          <label>Provider</label>
          <select id="llm-provider">
            <option value="openai">OpenAI</option>
            <option value="anthropic">Anthropic</option>
            <option value="google">Google</option>
            <option value="local">Local / Ollama</option>
          </select>
        </div>
        <div class="field-group">
          <label>Model</label>
          <select id="llm-model">
            <option value="gpt-5.4">gpt-5.4</option>
            <option value="gpt-5.2">gpt-5.2</option>
            <option value="codex-mini">codex-mini</option>
            <option value="claude-opus-4">claude-opus-4</option>
            <option value="claude-sonnet-4">claude-sonnet-4</option>
            <option value="gemini-2.5-pro">gemini-2.5-pro</option>
          </select>
        </div>
        <div class="field-group">
          <label>API Key</label>
          <input type="password" id="llm-api-key" placeholder="Enter API key...">
          <div class="key-status" id="llm-key-status">No key set</div>
        </div>
        <div style="display:flex;gap:10px;">
          <button class="btn btn-primary" onclick="saveLLMConfig()">Save Configuration</button>
          <button class="btn btn-blue" onclick="startOAuth()">Connect via OAuth</button>
        </div>
      </div>
    </div>

    <!-- Map Rebuild -->
    <div class="section">
      <h2>Map Management</h2>
      <div class="rebuild-section">
        <button class="btn btn-blue" onclick="rebuildMap()">Rebuild Map</button>
        <span class="rebuild-status" id="rebuild-status">Ready</span>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = window.location.origin;

function getToken() { return localStorage.getItem("earlybird_admin_token"); }
function setToken(t) { localStorage.setItem("earlybird_admin_token", t); }
function clearToken() { localStorage.removeItem("earlybird_admin_token"); }

function showToast(msg, isError) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = isError ? "toast error show" : "toast show";
  setTimeout(() => { el.className = "toast"; }, 3000);
}

async function api(method, path, body) {
  const opts = {
    method,
    headers: { "Content-Type": "application/json" },
  };
  const token = getToken();
  if (token) opts.headers["Authorization"] = "Bearer " + token;
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  if (res.status === 401) {
    clearToken();
    showScreen("login");
    throw new Error("Unauthorized");
  }
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    throw new Error(err.detail || "Request failed");
  }
  return res.json();
}

function showScreen(name) {
  document.getElementById("login-screen").style.display = name === "login" ? "flex" : "none";
  document.getElementById("dashboard").style.display = name === "dashboard" ? "block" : "none";
}

/* ── Login ──────────────────────────────────── */
async function doLogin() {
  const username = document.getElementById("login-user").value.trim();
  const password = document.getElementById("login-pass").value;
  const errEl = document.getElementById("login-error");
  errEl.style.display = "none";
  try {
    const data = await api("POST", "/admin/api/login", { username, password });
    setToken(data.token);
    showScreen("dashboard");
    loadDashboard();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = "block";
  }
}

function doLogout() {
  clearToken();
  showScreen("login");
}

/* ── Dashboard load ─────────────────────────── */
async function loadDashboard() {
  try {
    const me = await api("GET", "/admin/api/me");
    document.getElementById("user-display").textContent = me.username + " (admin)";
  } catch (e) { /* ignore */ }

  loadStats();
  loadSources();
  loadLLMConfig();
}

async function loadStats() {
  try {
    const s = await api("GET", "/admin/api/stats");
    document.getElementById("stat-items").textContent = s.item_count;
    document.getElementById("stat-categories").textContent = s.category_count;
    document.getElementById("stat-sources").textContent = s.sources_count;
  } catch (e) { /* ignore */ }
}

async function loadSources() {
  try {
    const sources = await api("GET", "/admin/api/sources");
    const tbody = document.getElementById("sources-body");
    tbody.innerHTML = "";
    sources.forEach(s => {
      const tr = document.createElement("tr");
      tr.innerHTML = "<td>" + s.group + "</td><td>" +
        s.sources.map(n => '<span class="source-tag">' + n + '</span>').join("") +
        "</td>";
      tbody.appendChild(tr);
    });
  } catch (e) { /* ignore */ }
}

async function addSource() {
  const name = document.getElementById("new-source-name").value.trim();
  if (!name) return;
  const group = document.getElementById("new-source-group").value.trim();
  try {
    await api("POST", "/admin/api/sources", { name, group: group || "" });
    document.getElementById("new-source-name").value = "";
    document.getElementById("new-source-group").value = "";
    showToast("Source added");
    loadSources();
  } catch (e) {
    showToast(e.message, true);
  }
}

/* ── LLM Config ─────────────────────────────── */
async function loadLLMConfig() {
  try {
    const cfg = await api("GET", "/admin/api/llm/config");
    document.getElementById("llm-provider").value = cfg.provider;
    document.getElementById("llm-model").value = cfg.model;
    const ks = document.getElementById("llm-key-status");
    if (cfg.api_key_set) {
      ks.textContent = "Key set: " + cfg.api_key_masked;
      ks.className = "key-status set";
    } else {
      ks.textContent = "No key set";
      ks.className = "key-status";
    }
  } catch (e) { /* ignore */ }
}

async function saveLLMConfig() {
  const provider = document.getElementById("llm-provider").value;
  const model = document.getElementById("llm-model").value;
  const apiKey = document.getElementById("llm-api-key").value.trim();
  const body = { provider, model };
  if (apiKey) body.api_key = apiKey;
  try {
    await api("POST", "/admin/api/llm/config", body);
    showToast("LLM configuration saved");
    document.getElementById("llm-api-key").value = "";
    loadLLMConfig();
  } catch (e) {
    showToast(e.message, true);
  }
}

function startOAuth() {
  showToast("OAuth flow not yet connected to a provider");
}

/* ── Map rebuild ────────────────────────────── */
async function rebuildMap() {
  const statusEl = document.getElementById("rebuild-status");
  statusEl.textContent = "Building...";
  try {
    await api("POST", "/map/build");
    statusEl.textContent = "Build complete!";
    showToast("Map rebuilt successfully");
    loadStats();
  } catch (e) {
    statusEl.textContent = "Build failed: " + e.message;
    showToast(e.message, true);
  }
}

/* ── Init ────────────────────────────────────── */
document.getElementById("login-pass").addEventListener("keydown", e => {
  if (e.key === "Enter") doLogin();
});

(async function init() {
  const token = getToken();
  if (token) {
    try {
      await api("GET", "/admin/api/me");
      showScreen("dashboard");
      loadDashboard();
      return;
    } catch (e) { clearToken(); }
  }
  showScreen("login");
})();
</script>
</body>
</html>
